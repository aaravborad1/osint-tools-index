name: Build and deploy OSINT index

on:
  schedule:
    - cron: "17 6 * * 1"   # every Monday 06:17 UTC
  workflow_dispatch: {}     # lets you trigger it manually from the Actions tab
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape source list
        run: python3 scripts/scrape_source.py

      - name: Check all links (~900+, concurrent)
        run: python3 scripts/check_links.py
        env:
          CONCURRENCY: "40"
          TIMEOUT: "12"

      - name: Build static site
        run: python3 scripts/build_site.py

      - name: Commit updated data/tools.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tools.json
          git diff --staged --quiet || git commit -m "chore: refresh link-check data [skip ci]"
          git push || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
